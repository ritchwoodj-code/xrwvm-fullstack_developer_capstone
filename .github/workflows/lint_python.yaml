name: Lint Python code

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Run flake8
        run: |
          flake8 server/djangoapp --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 server/djangoapp --count --max-complexity=10 --max-line-length=127 --statistics --exclude=server/djangoapp/migrations
